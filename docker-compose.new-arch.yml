version: "3.9"
services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3333/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agenda_metalique?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me
      GOOGLE_MAPS_API_KEY: ""
      GOOGLE_DRIVE_FOLDER_ID: ""
      GOOGLE_CLIENT_EMAIL: ""
      GOOGLE_PRIVATE_KEY: ""
      GOOGLE_PROJECT_ID: ""
      GOOGLE_CALENDAR_ID: "primary"
    ports:
      - "3333:3333"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agenda_metalique
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
